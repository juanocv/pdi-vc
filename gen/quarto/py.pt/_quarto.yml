bibliography: "/Users/fz/VSCode/pdi-vc/references.bib"
csl: "/Users/fz/VSCode/pdi-vc/includes/abnt.csl"

filters:
  - "/Users/fz/VSCode/pdi-vc/includes/emoji-filter.lua"

format:
  html:
    theme: cosmo
    grid:
      body-width: 1100px
      sidebar-width: 250px
      margin-width: 250px
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: false
    code-tools: true
    code-copy: true
    highlight-style: github
    lang: pt
    include-in-header:
      text: |
        <style>
        code { font-size: 0.9em; }
        pre { background-color: #f5f5f5; padding: 1em; border-radius: 4px; }
        </style>

  pdf:
    documentclass: book
    classoption: [openany, oneside, 12pt, a4paper]
    geometry:
      - left=2cm
      - right=2cm
      - top=2.5cm
      - bottom=2.5cm
    lang: pt
    toc: true
    number-sections: true
    colorlinks: true
    linkcolor: blue
    urlcolor: blue
    pdf-engine: lualatex
    latex-auto-install: false
    latex-max-runs: 3
    keep-tex: true
    cite-method: citeproc
    include-in-header:
      text: |
        \usepackage{url}
        \def\UrlBreaks{\do\/\do-}
        \usepackage{adjustbox}
        \def\pandocbounded#1{\adjustbox{max width=\linewidth, keepaspectratio}{#1}}
        \usepackage{microtype}
        \usepackage{amsmath,amssymb}
        \usepackage{booktabs}
        \usepackage{longtable}
        \usepackage{array}
        \usepackage{float}
        \usepackage{subcaption}
        \usepackage{xcolor}
        \usepackage{fancyvrb}
        \usepackage{csquotes}
        \usepackage{emoji}
        \setemojifont{TwemojiMozilla}
        \definecolor{pdi-blue}{RGB}{21,101,192}
        \definecolor{pdi-green}{RGB}{46,125,50}

execute:
  freeze: false
  cache: false
  echo: true
  warning: false
  error: false
