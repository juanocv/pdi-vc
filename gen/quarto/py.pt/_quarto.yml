# Gerado por gerar_livro.py — NÃO editar manualmente.

project:
  type: book
  output-dir: "/Users/fz/VSCode/pdi-vc/gen/book/py.pt"

book:
  title: "Processamento Digital de Imagens e Visão Computacional"
  subtitle: "Abordagem Prática com Python"
  author:
    - name: "Francisco de Assis Zampirolli"
      affiliation: "Universidade Federal do ABC"
  date: today
  language: pt
  downloads: [pdf]

  chapters:
    - index.qmd
    - prefacio.qmd
    - part: "Parte I — Fundamentos de PDI"
      chapters:
        - cap01/cap01.py.pt.ipynb
        - cap02/cap02.py.pt.ipynb
        - cap03/cap03.py.pt.ipynb
    - referencias.qmd


bibliography: "/Users/fz/VSCode/pdi-vc/references.bib"
csl: "/Users/fz/VSCode/pdi-vc/includes/abnt.csl"

filters:
  - "/Users/fz/VSCode/pdi-vc/includes/emoji-filter.lua"

format:
  html:
    theme: cosmo
    grid:
      body-width: 1100px
      sidebar-width: 250px
      margin-width: 250px
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: false
    code-tools: true
    code-copy: true
    highlight-style: github
    lang: pt
    include-in-header:
      text: |
        <style>
        code { font-size: 0.9em; }
        pre { background-color: #f5f5f5; padding: 1em; border-radius: 4px; }
        </style>

  pdf:
    documentclass: book
    classoption: [openany, oneside, 12pt, a4paper]
    geometry:
      - left=1.5cm
      - right=1.5cm
      - top=2.0cm
      - bottom=2.0cm
      - headheight=14pt
    lang: pt
    toc: true
    lot: true      # list of tables
    lof: true      # list of figures
    number-sections: true
    colorlinks: true
    linkcolor: blue
    urlcolor: blue
    pdf-engine: lualatex
    latex-auto-install: false
    latex-max-runs: 3
    keep-tex: true
    cite-method: citeproc

    include-in-header:
      - text: |
          \usepackage{url}
          \def\UrlBreaks{\do\/\do-}
          \usepackage{adjustbox}
          \def\pandocbounded#1{\adjustbox{max width=\linewidth, keepaspectratio}{#1}}
          \usepackage{microtype}
          \usepackage{amsmath,amssymb}
          \usepackage{booktabs}
          \usepackage{makecell}
          \renewcommand{\cellalign}{tl}
          \usepackage{longtable}
          \usepackage{array}
          \usepackage{float}
          \usepackage{subcaption}
          \usepackage{xcolor}
          \usepackage{fancyvrb}
          \usepackage{csquotes}
          \usepackage{emoji}
          \setemojifont{TwemojiMozilla}
          \definecolor{pdi-blue}{RGB}{21,101,192}
          \definecolor{pdi-green}{RGB}{46,125,50}
          \definecolor{darkblue}{RGB}{0,51,102}


          \usepackage{fancyhdr}
          \pagestyle{fancy}
          \fancyhf{}

          \fancyhead[L]{\small\textcolor{darkblue}{\textit{Processamento Digital de Imagens e Visão Computacional}}}
          \fancyhead[R]{\small\href{https://github.com/fzampirolli/pdi-vc}{github.com/fzampirolli/pdi-vc}}
          \fancyfoot[L]{\small\textcolor{darkblue}{\textit{UFABC}}}
          \fancyfoot[R]{\thepage}
          \renewcommand{\headrulewidth}{0.4pt}
          \renewcommand{\footrulewidth}{0.4pt}
          \fancypagestyle{plain}{
            \fancyhf{}
            \fancyfoot[L]{\small\textcolor{darkblue}{\textit{UFABC}}}
            \fancyfoot[R]{\thepage}
            \renewcommand{\headrulewidth}{0pt}
            \renewcommand{\footrulewidth}{0.4pt}
          }

          \usepackage{titlesec}
          \titleformat{\chapter}[display]
            {\normalfont\huge\bfseries\color{darkblue}}
            {\filleft\Large\chaptertitlename\ \thechapter}
            {1ex}
            {\titlerule\vspace{2ex}\Huge\filleft}
            [{\vspace{2ex}}]
          \titlespacing*{\chapter}{0pt}{5pt}{20pt}
          \titleformat{\part}[display]
            {\normalfont\Huge\bfseries\color{darkblue}\centering}
            {\Large\partname\ \thepart}
            {1ex}
            {\titlerule[2pt]\vspace{2ex}}
            [{\vspace{2ex}\titlerule[2pt]}]
      - file: fvextra.tex

execute:
  freeze: false
  cache: false
  echo: true
  warning: false
  error: false
